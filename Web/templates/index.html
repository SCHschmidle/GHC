<!DOCTYPE html>
<html>
<head>
    <title>{{ name }}</title>
</head>
<body>
    <h1>{{ name }} - OCR Tool</h1>
    
    <form method="post" action="/ocr">
        <button type="submit">OCR aus Zwischenablage starten</button>
    </form>
    
    {% if ocr_result %}
    <div>
        <h2>OCR Ergebnis (gefundene Zeiten):</h2>
        <pre>{{ ocr_result }}</pre>

        {% if full_ocr_text %}
        <h2>Vollständiger OCR Text:</h2>
        <pre>{{ full_ocr_text }}</pre>
        {% endif %}

        <h2>Berechnete Endzeit:</h2>
        <p>{{ end_time }}</p>

    </div>
    {% endif %}
</body>
</html>
